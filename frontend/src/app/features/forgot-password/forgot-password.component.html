<mat-toolbar color="transparent" class="forgot-header">
  <button mat-icon-button routerLink="/login" aria-label="Back to login">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <div class="header-left">
    <h1 class="page-title">Reset password</h1>
    <div class="page-subtitle">Securely recover access to your account.</div>
  </div>
</mat-toolbar>

<div class="forgot-container">
  <mat-card class="forgot-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Phone number</mat-label>
            <mat-icon matPrefix>phone_iphone</mat-icon>
            <input matInput formControlName="phoneNumber" placeholder="Enter phone number" />
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <mat-icon matPrefix>mail</mat-icon>
            <input matInput formControlName="email" placeholder="Enter email" />
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Account number</mat-label>
            <mat-icon matPrefix>account_balance</mat-icon>
            <input matInput formControlName="accountNumber" placeholder="Enter account number" />
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>New password</mat-label>
            <mat-icon matPrefix>lock</mat-icon>
            <input
              matInput
              type="password"
              formControlName="newPassword"
              placeholder="Enter new password"
            />
          </mat-form-field>
        </div>

        <div class="actions">
          <button mat-button type="button" (click)="close()">Cancel</button>
          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="form.invalid || isLoading"
          >
            {{ isLoading ? 'Resetting...' : 'Reset password' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
