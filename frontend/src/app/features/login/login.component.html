<div class="login-container">
  <mat-card class="login-card">
    <div class="logo-container">
      <div class="logo-circle">
        <mat-icon class="rupee-icon">currency_rupee</mat-icon>
      </div>
    </div>

    <h2 class="welcome-text">Welcome Back</h2>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="custom-label">Username</label>
          <mat-form-field appearance="outline" class="full-width no-bottom-padding" color="primary">
            <input matInput formControlName="username" placeholder="Enter your username" />
            <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
              Username is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="form-group">
          <label class="custom-label">Password</label>
          <mat-form-field appearance="outline" class="full-width no-bottom-padding" color="primary">
            <input
              matInput
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              placeholder="Enter your password"
            />
            <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
              <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
              Password is required
            </mat-error>
          </mat-form-field>
        </div>

        <button
          mat-flat-button
          color="primary"
          class="login-button"
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
        >
          <mat-spinner diameter="20" *ngIf="isLoading; else loginText" class="white-spinner"></mat-spinner>
          <ng-template #loginText>Login</ng-template>
        </button>

        <div class="forgot-password">
          <a href="" (click)="openForgotPassword($event)">Forgot password?</a>
        </div>

        <div class="signup-link">
          <span>Don't have an account? </span>
          <a routerLink="/signup">Sign Up</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
