spring.application.name=backend

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/moneyTransferDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.jwt.secret=MySuperSecureJwtSecretKeyForMoneyTransferApp123!
spring.jwt.access-token-expiration=3600
spring.jwt.refresh-token-expiration=100000

spring.output.ansi.enabled=ALWAYS
logging.level.root=INFO
logging.file.name=logs/logs.txt

